  seo_title: "Ecliptica | Новий симулятор виживання та колонії з відкритим світом"
  ai_genre: "Ecliptica — це симулятор виживання колонії з відкритим світом від першої особи з повністю динамічною економікою, що поєднує управління логістикою та дослідження ворожого світу."
  seo_description: "Відкрийте для себе Ecliptica — новий симулятор виживання у відкритому світі. Будуй колонію, добувай ресурси та виживай у суворих умовах у цій інді-новинці 2026 року."
  mission_title: "Вхід в атмосферу"


  mission_desc_1: "Тривалий транзит завершено. Оціночна тривалість: 10 000 циклів. Архіви пам'яті недоступні. Аналіз середовища... Умови на поверхні: Ворожі. Статус біо-юнітів: Функціональний. Протокол адаптації: Ініційовано."
  mission_desc_2: "Виявлено розпад орбіти. Аварійна висадка неминуча. Йде розгортання рятувальних капсул. Основна директива: Створення інфраструктури самозабезпечення на поверхні."
  mission_desc_3: "Ресурси — єдина константа. Оптимізуйте видобуток, опануйте логістику та домінуйте в середовищі. Емоційні реакції були видалені для максимальної ефективності. Виживання — це математична неминучість при дотриманні протоколів."
  btn_wishlist: "ПІДТВЕРДИТИ ВИСАДКУ (STEAM)"
  faq_title: "Центр Даних (FAQ)"
  faq_q1: "Що це за гра?"
  faq_a1: "Ecliptica — це симулятор виживання колонії від першої особи. Основна увага приділяється видобутку ресурсів, автоматизації логістики та побудові самостійної інфраструктури у ворожому середовищі."
  faq_q2: "На які ігри схожа Ecliptica?"

  faq_a2: "Ecliptica поєднує автоматизацію Factorio, управління колонією Rimworld та дослідження No Man's Sky. Економіка натхненна серією X4 Foundations."
  faq_q3: "Чи є в грі динамічна економіка?"
  faq_a3: "Так. Економіка базується на логічних алгоритмах попиту та пропозиції по всій планеті."
  faq_q4: "Чи будуть у грі квести?"
  faq_a4: "Так. Сюжетні арки, побічні місії та процедурно генеровані завдання."
  faq_q5: "Чи можна змінювати ландшафт?"
  faq_a5: "Так, повна деформація ландшафту — ви можете буквально підривати гори."
  faq_q6: "Чи можна автоматизувати видобуток?"
  faq_a6: "Так, автоматизація — це ядро гри. Все можна об'єднати в автономну мережу."
  faq_q7: "Чи будуть глобальні конфлікти?"
  faq_a7: "Так. Фракції можуть об'єднуватися для досягнення своїх цілей у глобальному масштабі."
  faq_q8: "Чи є сенс у дослідженні світу?"
  faq_a8: "Так. Світ спеціально спроектований для винагороди допитливих гравців."
  faq_q9: "Чи буде мультиплеєр?"
  faq_a9: "Так, заплановано після виходу в ранній доступ."
  faq_q10: "Чи є безкоштовна демо-версія?"
  faq_a10: "Так, скоро вийде публічна демо-версія з можливістю збереження прогресу."
  faq_q11: "На якому движку працює гра?"
  faq_a11: "Власний движок на базі Qt Quick 3D для максимальної продуктивності."
  faq_q12: "Наскільки великий світ?"
  faq_a12: "Світ нескінченний, обмежений лише точністю обчислень."
  faq_q13: "Яка дальність промальовування?"
  faq_a13: "Одна з найбільших — до 14 км радіус (30 км діаметр) без втрати швидкості."
  faq_q14: "Які платформи ви підтримуєте?"
  faq_a14: "Ecliptica офіційно підтримує Linux (Ubuntu), Steam Deck та Windows."

