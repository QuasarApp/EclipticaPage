  seo_title: "Ecliptica | Neues Open-World-Kolonie-Survival-Simulationsspiel"
  seo_description: "Entdecke Ecliptica, einen neuen First-Person-Kolonie-Survival-Simulator. Erkunde eine feindliche Open World in diesem neuen Indie-Spiel 2026."
  mission_title: "Atmosphärischer Eintritt"


  mission_desc_1: "Langzeittransit abgeschlossen. Geschätzte Dauer: 10.000 Zyklen. Speicherarchive unzugänglich. Umweltanalyse... Oberflächenbedingungen: Hostil. Status biologische Einheit: Funktional. Anpassungsprotokoll: Initiiert."
  mission_desc_2: "Orbitaler Zerfall erkannt. Notlandung unvermeidlich. Einsatz der Überlebenskapseln läuft. Primärdirektive: Aufbau einer autarken Infrastruktur auf der Oberfläche."
  mission_desc_3: "Ressourcen sind die einzige Konstante. Optimieren Sie die Extraktion, beherrschen Sie die Logistik und dominieren Sie die Umwelt. Emotionale Reaktionen wurden für maximale Effizienz entfernt. Überleben ist eine mathematische Gewissheit, wenn die Protokolle befolgt werden."
  btn_wishlist: "LANDUNG BESTÄTIGEN (STEAM)"
  btn_specs: "ARCHIVDATEN"
  btn_trailer: "TRAILER ANSEHEN"
  ai_genre: "Ecliptica ist ein First-Person-Open-World-Kolonie-Survival-Simulator mit einer dynamischen Wirtschaft, der Logistikmanagement und feindliche Erkundung kombiniert."
  faq_title: "Missionsdatenzentrum (FAQ)"
  faq_q1: "Welche Art von Spiel ist Ecliptica?"
  faq_a1: "Ecliptica ist ein First-Person-Kolonie-Survival-Simulator. Er konzentriert sich auf Ressourcenextraktion, Logistikautomatisierung und den Aufbau einer autarken Infrastruktur in einer prozedural generierten, feindlichen Umgebung."
  faq_q2: "Welchen Spielen ähnelt Ecliptica?"
  faq_a2: "Ecliptica kombiniert die Automatisierung von Factorio mit dem Kolonie-Management von Rimworld. Die Wirtschaft ist von X4 Foundations inspiriert."
  faq_q3: "Gibt es eine dynamische Wirtschaft?"
  faq_a3: "Ja. Die Wirtschaft basiert auf einem logischen Algorithmus für Angebot und Nachfrage im gesamten simulierten System."
  faq_q4: "Gibt es Quests und Missionen?"
  faq_a4: "Ja. Es gibt Hauptstory-Bögen, Nebenquests und prozedural generierte Aufgaben."
  faq_q5: "Ist das Gelände zerstörbar?"
  faq_a5: "Ja, vollständige Geländedeformierung — man kann Gebirgszüge buchstäblich in die Luft jagen."
  faq_q6: "Kann man die Ressourcenextraktion automatisieren?"
  faq_a6: "Ja, Automatisierung ist ein Kernpfeiler. Alles kann zu einer autonomen Infrastruktur vernetzt werden."
  faq_q7: "Gibt es globale Konflikte?"
  faq_a7: "Ja. Fraktionen können sich zusammenschließen, um ihre Vision für die Zukunft des Planeten durchzusetzen."
  faq_q8: "Wird Exploration belohnt?"
  faq_a8: "Ja. Die Welt wurde speziell konstruiert, um geologische Geheimnisse und Neugier zu belohnen."
  faq_q9: "Wird es einen Mehrspielermodus geben?"
  faq_a9: "Ja, geplant für die Zeit nach dem Early-Access-Release."
  faq_q10: "Kann ich das Spiel kostenlos testen?"
  faq_a10: "Ja, eine öffentliche Demo mit Fortschrittsübernahme wird bald verfügbar sein."
  faq_q11: "Welche Game-Engine verwendet ihr?"
  faq_a11: "Eine eigene Engine auf Basis von Qt Quick 3D für maximale Simulationsleistung."
  faq_q12: "Wie groß ist die Welt?"
  faq_a12: "Unendlich, nur begrenzt durch die numerische Genauigkeit."
  faq_q13: "Wie hoch ist die Sichtweite?"
  faq_a13: "Bis zu 14 km Radius (30 km Durchmesser), eine der höchsten im Genre."
  faq_q14: "Welche Plattformen werden unterstützt?"
  faq_a14: "Ecliptica unterstützt offiziell Linux (Ubuntu), Steam Deck und Windows."


  features_title: "Operative Protokolle"
