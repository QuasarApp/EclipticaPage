  feature_2_title: "Локальна геометрія"
  feature_2_desc: "Аналізуйте топографію. Визначайте скупчення ресурсів та переміщуйтесь у зонах високого ризику для отримання переваг."
  feature_3_title: "Алгоритм економіки"
