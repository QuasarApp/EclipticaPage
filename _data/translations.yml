en:
  header_boot: "[ SYSTEM REBOOT IN PROGRESS... TARGET REACHED ]"
  nav_about: "About"
  nav_features: "Features"
  nav_visuals: "Visuals"
  nav_faq: "FAQ"
  nav_wishlist_btn: "Wishlist"

  ai_genre: "Ecliptica is a first-person open-world colony survival simulator with a fully dynamic economy, blending logistic management and hostile exploration."
  faq_title: "Mission Data Hub (FAQ)"
  faq_q1: "What type of game is Ecliptica?"
  faq_a1: "Ecliptica is a first-person colony survival simulator. It focuses on resource extraction, logistic automation, and building a self-sustaining infrastructure in a procedurally generated hostile environment."
  faq_q2: "What games is Ecliptica similar to?"
  faq_a2: "Ecliptica combines the complex automation of Factorio, the community-driven colony management of Rimworld, and the vast curiosity of No Man's Sky. Our economic systems are deeply inspired by the dynamic markets of X4 Foundations."
  faq_q3: "Is there a dynamic economy?"
  faq_a3: "Yes. The economy is logic-driven, calculating values based on scarcity, demand, and processing complexity across the entire simulated world."
  faq_q4: "Are there quests and missions?"
  faq_a4: "Yes. You will find major story arcs, localized sub-quests, and procedurally generated tasks that emerge naturally from the state of the world."
  faq_q5: "Is the terrain destructible?"
  faq_a5: "Absolutely. The entire world features full-scale terrain deformation. You can shape the planet to your needs or literally blow up mountain ranges."
  faq_q6: "Can I automate resource extraction?"
  faq_a6: "Yes. Automation is a core pillar. Every extraction and refinement process can be linked into a fully autonomous infrastructure."
  faq_q7: "Are there global conflicts?"
  faq_a7: "Yes. Faction-based simulation allows entities to unite into massive organizations with their own competing visions for the planet's future."
  faq_q8: "Is exploration encouraged?"
  faq_a8: "Yes. Our procedural world generation was specifically engineered to reward curiosity and reveal unique geological secrets."
  faq_q9: "Will there be multiplayer?"
  faq_a9: "Yes. Multiplayer functionality is planned for implementation following the initial Early Access release."
  faq_q10: "Can I try the game for free?"
  faq_a10: "Yes. A public demo will be available soon, allowing you to experience the core mechanics with progress transferable to the full game."
  faq_q11: "Which game engine do you use?"
  faq_a11: "Ecliptica runs on a custom-built engine developed with Qt Quick 3D for maximum performance and unique simulation capabilities."
  faq_q12: "How large is the world?"
  faq_a12: "The world is theoretically infinite. The only functional limits are defined by the precision of numeric calculations."
  faq_q13: "What is the maximum draw distance?"
  faq_a13: "We offer one of the highest view distances in the genre, rendering terrain up to 14km in any direction (~30km total diameter) without major performance degradation."
  faq_q14: "Which platforms do you support?"
  faq_a14: "Ecliptica officially supports Linux (Ubuntu), Steam Deck, and Windows."


  seo_title: "Ecliptica | New Open-World Colony Survival Simulator"

  seo_description: "Discover Ecliptica, a new first-person colony survival simulator. Explore a hostile open world, manage a dynamic economy, and secure your survival in this indie 2026 release."
  mission_title: "Atmospheric Entry"


  mission_desc_1: "Long-term transit completed. Estimated duration: 10,000 cycles. Memory archives are inaccessible. Analyzing current environment... Surface conditions: Hostile. Biological unit status: Functional. Adaptation protocol: Initiated."
  mission_desc_2: "Orbital decay detected. Emergency landing is unavoidable. Deployment of survival pods is underway. Primary directive: Establish a self-sustaining infrastructure on the local surface."
  mission_desc_3: "Resources are the only constant. Optimize extraction, master local logistics, and dominate the environment. Emotional responses have been phased out for maximum efficiency. Survival is a mathematical certainty if protocols are followed."
  btn_wishlist: "COMMENCE LANDING (STEAM)"
  btn_specs: "ARCHIVE DATA"
  btn_trailer: "WATCH TRAILER"
  features_title: "Operational Protocols"
  feature_1_title: "Logical Interface"
  feature_1_desc: "Monitor vitals and systems through a high-efficiency HUD. Manage biological requirements with mathematical precision."
  feature_2_title: "Local Geometry"
  feature_2_desc: "Analyze procedurally generated topography. Identify strategic resource clusters and navigate high-risk zones for optimal return."
  feature_3_title: "Economy Algorithm"
  feature_3_desc: "The underlying trade systems operate on pure logic. Supply, demand, and scarcity dictate the global value of all extracted materials."
  feature_4_title: "Corporate Units"
  feature_4_desc: "Calculate the benefit of founding or joining structured corporate entities to optimize resource flow and strategic security."
  visuals_title: "Surface Data Logs"
  trailer_title: "Visual Recon (Trailer)"
  comms_title: "Signal Relay"
  footer: "Confirm Protocol"
  footer_desc: "Transit is terminal. Permanent settlement is required. Secure your deployment coordinates before structural integrity fails."

ru:
  header_boot: "[ ПЕРЕЗАГРУЗКА СИСТЕМ... ЦЕЛЬ ДОСТИГНУТА ]"
  nav_about: "Об игре"
  nav_features: "Особенности"
  nav_visuals: "Визуал"
  nav_faq: "FAQ"
  nav_wishlist_btn: "В список"

  ai_genre: "Ecliptica — это симулятор выживания колонии с открытым миром, объединяющий управление логистикой и исследование враждебной среды."
  faq_title: "Центр Данных (FAQ)"
  faq_q1: "Что это за игра?"
  faq_a1: "Ecliptica — это симулятор выживания колонии от первого лица. Основной упор сделан на добычу ресурсов, автоматизацию логистики и создание автономной инфраструктуры во враждебном мире."
  faq_q2: "На какие игры похожа Ecliptica?"
  faq_a2: "Ecliptica объединяет автоматизацию из Factorio, управление колонией из Rimworld и дух исследования No Man's Sky. При этом наша экономическая модель вдохновлена глубокими динамическими рынками серии X4 Foundations."
  faq_q3: "Есть ли в игре динамическая экономика?"
  faq_a3: "Да. Внутренняя экономика работает на логическом алгоритме, который рассчитывает стоимость ресурсов на основе их дефицита, спроса и сложности логистической цепочки."
  faq_q4: "Будут ли в игре квесты?"
  faq_a4: "Да. Вас ждут крупные сюжетные ветки, локальные побочные задания, а также процедурно генерируемые миссии, зависящие от состояния мира."
  faq_q5: "Можно ли изменять ландшафт?"
  faq_a5: "Да, ландшафт полностью деформируется на всю ширину мира. Вы можете преобразовывать поверхность под свои нужды или буквально взрывать целые горные хребты."
  faq_q6: "Можно ли автоматизировать добычу ресурсов?"
  faq_a6: "Да. Автоматизация — одна из основ игры. Каждое производство можно превратить в полностью автономную инфраструктуру."
  faq_q7: "Будут ли в игре глобальные конфликты?"
  faq_a7: "Да. Все участники симуляции могут объединяться в огромные фракции с собственным видением будущего планеты и конкурирующими интересами."
  faq_q8: "Есть ли смысл в исследовании мира?"
  faq_a8: "Определенно. Наш процедурно генерируемый мир специально проектировался так, чтобы поощрять любопытство и открывать уникальные геологические секреты."
  faq_q9: "Будет ли в игре мультиплеер?"
  faq_a9: "Да, но он будет реализован после выхода игры в ранний доступ."
  faq_q10: "Можно ли попробовать игру бесплатно?"
  faq_a10: "Да. Скоро появится публичная демо-версия, которая позволит оценить основные механики и сохранит практически весь оригинальный контент."
  faq_q11: "На каком движке разработана игра?"
  faq_a11: "Мы используем собственный движок, созданный на базе Qt Quick 3D для достижения максимальной производительности симуляции."
  faq_q12: "Насколько огромен игровой мир?"
  faq_a12: "Мир бесконечен. Единственным ограничением является предел точности вычисления чисел."
  faq_q13: "Какова дальность прорисовки?"
  faq_a13: "Одна из самых больших на рынке — мы поддерживаем видимость на 10-14 километров в любую сторону (почти 30 км в диаметре) без серьезных проблем с производительностью."
  faq_q14: "Какие платформы вы поддерживаете?"
  faq_a14: "Ecliptica официально поддерживает Linux (Ubuntu), Steam Deck и Windows."


  seo_title: "Ecliptica | Новый симулятор выживания и колонии с открытым миром"

  seo_description: "Откройте для себя Ecliptica — новый симулятор выживания в открытом мире. Строй колонию, добывай ресурсы и выживай в суровых условиях в этой инди-новинке 2026 года."
  mission_title: "Вход в атмосферу"


  mission_desc_1: "Длительный транзит завершен. Оценочная длительность: 10 000 циклов. Архивы памяти недоступны. Анализ текущей среды... Условия на поверхности: Враждебные. Статус био-юнитов: Функционален. Протокол адаптации: Инициирован."
  mission_desc_2: "Обнаружен распад орбиты. Аварийная высадка неизбежна. Идет развертывание спасательных капсул. Основная директива: Создание самообеспечивающейся инфраструктуры на поверхности."
  mission_desc_3: "Ресурсы — единственная константа. Оптимизируйте добычу, освойте логистику и доминируйте в окружающей среде. Эмоциональные реакции были удалены для максимальной эффективности. Выживание — это математическая неизбежность при соблюдении протоколов."
  btn_wishlist: "ПОДТВЕРДИТЬ ВЫСАДКУ (STEAM)"
  btn_specs: "АРХИВНЫЕ ДАННЫЕ"
  btn_trailer: "СМОТРЕТЬ ТРЕЙЛЕР"
  features_title: "Операционные протоколы"
  feature_1_title: "Логический интерфейс"
  feature_1_desc: "Контролируйте показатели через высокоэффективный HUD. Управляйте биологическими потребностями с математической точностью."
  feature_2_title: "Локальная геометрия"
  feature_2_desc: "Анализируйте процедурно генерируемую топографию. Определяйте скопления ресурсов и перемещайтесь в зонах высокого риска для получения преимуществ."
  feature_3_title: "Алгоритм экономики"
  feature_3_desc: "Торговые системы работают на чистой логике. Спрос, предложение и дефицит диктуют ценность всех добытых материалов."
  feature_4_title: "Корпоративные юниты"
  feature_4_desc: "Рассчитайте выгоду от создания или вступления в корпоративные структуры для оптимизации потока ресурсов и безопасности."
  visuals_title: "Логи данных поверхности"
  trailer_title: "Визуальный отчет (Трейлер)"
  comms_title: "Ретрансляция сигнала"
  footer: "Подтвердить протокол"
  footer_desc: "Транзит завершен. Требуется постоянное поселение. Закрепите координаты развертывания до потери структурной целостности."

