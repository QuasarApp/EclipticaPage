  seo_title: "Ecliptica | 2026新开放世界殖民地生存模拟游戏"
  seo_description: "探索 Ecliptica，一款全新的第一人称殖民地生存模拟器。在充满敌意的开放世界中生存，管理动态经济。2026年独立游戏力作。"
  mission_title: "进入大气层"


  mission_desc_1: "长期航行结束。预计时长：10,000周期。记忆档案无法访问。环境分析中... 表面条件：敌对。生物单元状态：功能正常。适应协议：已启动。"
  mission_desc_2: "检测到轨道衰变。紧急着陆不可避免。正在部署生存舱。主要指令：在当地表面建立自给自足的基础设施。"
  mission_desc_3: "资源是唯一的常量。优化开采，掌握物流，统治环境。为实现效率最大化，已移除情感反应。只要遵循协议，生存就是数学上的必然。"
  btn_wishlist: "确认着陆 (STEAM)"
  btn_specs: "存档数据"
  btn_trailer: "观看预告片"
  ai_genre: "Ecliptica 是一款具有动态经济系统的第一人称开放世界殖民地生存模拟器，结合了物流管理和敌对环境探索。"
  faq_title: "任务数据中心 (FAQ)"
  faq_q1: "这是什么类型的游戏？"
  faq_a1: "Ecliptica 是一款第一人称殖民地生存模拟器。它专注于资源开采、物流自动化，并在程序生成的敌对环境中建立自给自足的基础设施。"
  faq_q2: "Ecliptica 与哪些游戏相似？"

  faq_a2: "Ecliptica 结合了 Factorio 的自动化、Rimworld 的殖民地管理和 No Man's Sky 的探索感。经济系统受 X4 Foundations 启发。"
  faq_q3: "有动态经济系统吗？"
  faq_a3: "有。经济基于逻辑算法，根据全球范围内的供需关系实时运作。"
  faq_q4: "有任务系统吗？"
  faq_a4: "有。包括主线剧情、支线任务和随世界状态生成的随机任务。"
  faq_q5: "地形可以破坏吗？"
  faq_a5: "可以。支持全地图地形变形——你甚至可以炸平整座山脉。"
  faq_q6: "资源采集可以自动化吗？"
  faq_a6: "可以。自动化是核心玩法。所有生产过程都可以整合进自动化的基础设施中。"
  faq_q7: "有全球规模的冲突吗？"
  faq_a7: "有。各派系可以为了各自对星球未来的愿景而结盟并对抗。"
  faq_q8: "鼓励探索吗？"
  faq_a8: "是的。随机生成的星球旨在奖励好奇心并揭示独特的资源秘密。"
  faq_q9: "有多人模式吗？"
  faq_a9: "有。计划在抢先体验版发布后的一段时间内实现。"
  faq_q10: "可以免费试玩吗？"
  faq_a10: "可以。公开民主版即将推出，核心进度可继承至正式版。"
  faq_q11: "使用的是什么引擎？"
  faq_a11: "基于 Qt Quick 3D 自主开发的引擎，旨在实现最高效的模拟性能。"
  faq_q12: "世界规模有多大？"
  faq_a12: "理论上是无限的。唯一的限制取决于数值计算的精度。"
  faq_q13: "最大渲染距离是多少？"
  faq_a13: "行业顶尖水平——支持 14km 半径（30km 直径）内的地形渲染，性能表现出色。"
  faq_q14: "你们支持哪些平台？"
  faq_a14: "Ecliptica 官方支持 Linux (Ubuntu), Steam Deck 和 Windows 平台。"


