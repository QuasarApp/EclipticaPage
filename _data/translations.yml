  seo_title: "Ecliptica | 新作オープンワールド・コロニーサバイバルシミュレーター"
  seo_description: "新作の一人称視点コロニーサバイバルシミュレーター「Ecliptica」を体験せよ。敵対的なオープンワールドを探索し、生き残れ。2026年リリースのインディーゲーム。"
  mission_title: "大気圏突入"


  mission_desc_1: "長期移動完了。推定期間：10,000サイクル。メモリアーカイブにアクセス不可。環境分析中... 表面条件：敵対的。生体ユニットステータス：機能的。適応プロトコル：開始。"
  mission_desc_2: "軌道衰退を検知。緊急着陸は不可避。生存ポッドを展開中。主要指令：現地の表面に自立したインフラを構築せよ。"
  mission_desc_3: "資源こそが唯一の定数だ。採掘を最適化し、物流を支配し、環境を制圧せよ。効率を最大化するため、感情的反応は削除済みだ。プロトコルに従えば、生存は数学的な確実性となる。"
  btn_wishlist: "着陸を開始する (STEAM)"
  btn_specs: "アーカイブデータ"
  btn_trailer: "トレーラーを見る"
  ai_genre: "Eclipticaは、動的な経済、物流管理、敵対的な探索を組み合わせた、一人称視点のオープンワールド・コロニーサバイバルシミュレーターです。"
  faq_title: "ミッションデータハブ (FAQ)"
  faq_q1: "Eclipticaはどのようなゲームですか？"
  faq_a1: "Eclipticaは一人称視点のコロニーサバイバルシミュレーターです。資源採掘、物流の自動化、そしてプロシージャル生成された敵対的な環境での自立したインフラ構築に焦点を当てています。"
  faq_q2: "どんなゲームに似ていますか？"
  faq_a2: "Factorioの自動化とRimworldの管理を融合。経済はX4 Foundationsに影響を受けています。"
  faq_q3: "動的な経済システムはありますか？"
  faq_a3: "はい。需要と供給に基づく論理的な経済アルゴリズムが稼働しています。"
  faq_q4: "クエストはありますか？"
  faq_a4: "はい。メインストーリー、サイドクエスト、自動生成ミッションがあります。"
  faq_q5: "地形は変えられますか？"
  faq_a5: "はい。地形は完全変形可能で、山を爆破することも可能です。"
  faq_q6: "自動化はできますか？"
  faq_a6: "はい。自動化は核心的な要素であり、すべてを自律化できます。"
  faq_q7: "勢力争いはありますか？"
  faq_a7: "はい。派閥シミュレーションにより、巨大組織が惑星の未来を争います。"
  faq_q8: "探索の要素はありますか？"
  faq_a8: "はい。地質学的な秘密を探す好奇心を刺激する設計です。"
  faq_q9: "マルチプレイヤーはありますか？"
  faq_a9: "はい。早期アクセスのリリース後に追加予定です。"
  faq_q10: "無料で試せますか？"
  faq_a10: "はい。間もなく公開デモ版が登場し、進行状況も引き継げます。"
  faq_q11: "エンジンは何ですか？"
  faq_a11: "Qt Quick 3Dベースの独自エンジンを採用しています。"
  faq_q12: "世界はどれくらい広いですか？"
  faq_a12: "理論上は無限です。数値計算の精度のみが限界です。"
  faq_q13: "描画距離はどれくらいですか？"
  faq_a13: "業界最大級の14km（直径30km）の描画距離を実現しています。"
  faq_q14: "サポートされているプラットフォームは何ですか？"
  faq_a14: "EclipticaはLinux (Ubuntu)、Steam Deck、Windowsを公式にサポートしています。"


