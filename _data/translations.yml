en:
  header_boot: "[ SYSTEM REBOOT IN PROGRESS... TARGET REACHED ]"
  mission_title: "Atmospheric Entry"
  mission_desc_1: "Long-term transit completed. Estimated duration: 10,000 cycles. Memory archives are inaccessible. Analyzing current environment... Surface conditions: Hostile. Biological unit status: Functional. Adaptation protocol: Initiated."
  mission_desc_2: "Orbital decay detected. Emergency landing is unavoidable. Deployment of survival pods is underway. Primary directive: Establish a self-sustaining infrastructure on the local surface."
  mission_desc_3: "Resources are the only constant. Optimize extraction, master local logistics, and dominate the environment. Emotional responses have been phased out for maximum efficiency. Survival is a mathematical certainty if protocols are followed."
  btn_wishlist: "COMMENCE LANDING (STEAM)"
  btn_specs: "ARCHIVE DATA"
  btn_trailer: "WATCH TRAILER"
  features_title: "Operational Protocols"
  feature_1_title: "Logical Interface"
  feature_1_desc: "Monitor vitals and systems through a high-efficiency HUD. Manage biological requirements with mathematical precision."
  feature_2_title: "Local Geometry"
  feature_2_desc: "Analyze procedurally generated topography. Identify strategic resource clusters and navigate high-risk zones for optimal return."
  feature_3_title: "Economy Algorithm"
  feature_3_desc: "The underlying trade systems operate on pure logic. Supply, demand, and scarcity dictate the global value of all extracted materials."
  feature_4_title: "Corporate Units"
  feature_4_desc: "Calculate the benefit of founding or joining structured corporate entities to optimize resource flow and strategic security."
  visuals_title: "Surface Data Logs"
  trailer_title: "Visual Recon (Trailer)"
  comms_title: "Signal Relay"
  footer: "Confirm Protocol"
  footer_desc: "Transit is terminal. Permanent settlement is required. Secure your deployment coordinates before structural integrity fails."

ru:
  header_boot: "[ ПЕРЕЗАГРУЗКА СИСТЕМ... ЦЕЛЬ ДОСТИГНУТА ]"
  mission_title: "Вход в атмосферу"
  mission_desc_1: "Длительный транзит завершен. Оценочная длительность: 10 000 циклов. Архивы памяти недоступны. Анализ текущей среды... Условия на поверхности: Враждебные. Статус био-юнитов: Функционален. Протокол адаптации: Инициирован."
  mission_desc_2: "Обнаружен распад орбиты. Аварийная высадка неизбежна. Идет развертывание спасательных капсул. Основная директива: Создание самообеспечивающейся инфраструктуры на поверхности."
  mission_desc_3: "Ресурсы — единственная константа. Оптимизируйте добычу, освойте логистику и доминируйте в окружающей среде. Эмоциональные реакции были удалены для максимальной эффективности. Выживание — это математическая неизбежность при соблюдении протоколов."
  btn_wishlist: "ПОДТВЕРДИТЬ ВЫСАДКУ (STEAM)"
  btn_specs: "АРХИВНЫЕ ДАННЫЕ"
  btn_trailer: "СМОТРЕТЬ ТРЕЙЛЕР"
  features_title: "Операционные протоколы"
  feature_1_title: "Логический интерфейс"
  feature_1_desc: "Контролируйте показатели через высокоэффективный HUD. Управляйте биологическими потребностями с математической точностью."
  feature_2_title: "Локальная геометрия"
  feature_2_desc: "Анализируйте процедурно генерируемую топографию. Определяйте скопления ресурсов и перемещайтесь в зонах высокого риска для получения преимуществ."
  feature_3_title: "Алгоритм экономики"
  feature_3_desc: "Торговые системы работают на чистой логике. Спрос, предложение и дефицит диктуют ценность всех добытых материалов."
  feature_4_title: "Корпоративные юниты"
  feature_4_desc: "Рассчитайте выгоду от создания или вступления в корпоративные структуры для оптимизации потока ресурсов и безопасности."
  visuals_title: "Логи данных поверхности"
  trailer_title: "Визуальный отчет (Трейлер)"
  comms_title: "Ретрансляция сигнала"
  footer: "Подтвердить протокол"
  footer_desc: "Транзит завершен. Требуется постоянное поселение. Закрепите координаты развертывания до потери структурной целостности."

ua:
  header_boot: "[ ПЕРЕЗАВАНТАЖЕННЯ СИСТЕМ... ЦІЛЬ ДОСЯГНУТА ]"
  mission_title: "Вхід в атмосферу"
  mission_desc_1: "Тривалий транзит завершено. Оціночна тривалість: 10 000 циклів. Архіви пам'яті недоступні. Аналіз середовища... Умови на поверхні: Ворожі. Статус біо-юнітів: Функціональний. Протокол адаптації: Ініційовано."
  mission_desc_2: "Виявлено розпад орбіти. Аварійна висадка неминуча. Йде розгортання рятувальних капсул. Основна директива: Створення інфраструктури самозабезпечення на поверхні."
  mission_desc_3: "Ресурси — єдина константа. Оптимізуйте видобуток, опануйте логістику та домінуйте в середовищі. Емоційні реакції були видалені для максимальної ефективності. Виживання — це математична неминучість при дотриманні протоколів."
  btn_wishlist: "ПІДТВЕРДИТИ ВИСАДКУ (STEAM)"
  btn_specs: "АРХІВНІ ДАНІ"
  btn_trailer: "ДИВИТИСЯ ТРЕЙЛЕР"
  features_title: "Операційні протоколи"
  feature_1_title: "Логічний інтерфейс"
  feature_1_desc: "Контролюйте показники через високоефективний HUD. Керуйте біологічними потребами з математичною точністю."
  feature_2_title: "Локальна геометрія"
  feature_2_desc: "Аналізуйте топографію. Визначайте скупчення ресурсів та переміщуйтесь у зонах високого ризику для отримання переваг."
  feature_3_title: "Алгоритм економіки"
  feature_3_desc: "Торгові системи працюють на чистій логіці. Попит, пропозиція та дефіцит диктують цінність усіх видобутих матеріалів."
  feature_4_title: "Корпоративні юніти"
  feature_4_desc: "Розрахуйте вигоду від створення або вступу в корпоративні структури для оптимізації потоку ресурсів."
  visuals_title: "Логи даних поверхні"
  trailer_title: "Візуальний звіт (Трейлер)"
  comms_title: "Ретрансляція сигналу"
  footer: "Підтвердити протокол"
  footer_desc: "Транзит завершено. Потрібне постійне поселення. Закріпіть координати розгортання до втрати структурної цілісності."

fr:
  header_boot: "[ REDÉMARRAGE DU SYSTÈME... DESTINATION ATTEINTE ]"
  mission_title: "Entrée Atmosphérique"
  mission_desc_1: "Transit longue durée terminé. Durée estimée : 10 000 cycles. Archives mémorielles inaccessibles. Analyse de l'environnement... Conditions de surface : Hostiles. Statut de l'unité biologique : Fonctionnel. Protocole d'adaptation : Initié."
  mission_desc_2: "Décomposition orbitale détectée. Atterrissage d'urgence inévitable. Déploiement des capsules de survie en cours. Directive primaire : Établir une infrastructure autonome sur la surface locale."
  mission_desc_3: "Les ressources sont la seule constante. Optimisez l'extraction, maîtrisez la logistique et dominez l'environnement. Les réponses émotionnelles ont été supprimées pour une efficacité maximale. La survie est une certitude mathématique si les protocoles sont suivis."
  btn_wishlist: "CONFIRMER L'ATTERRISSAGE (STEAM)"
  btn_specs: "DONNÉES D'ARCHIVES"
  btn_trailer: "REGARDER LA BANDE-ANNONCE"
  features_title: "Protocoles Opérationnels"
  feature_1_title: "Interface Logique"
  feature_1_desc: "Surveillez les fonctions vitales via un HUD haute efficacité. Gérez les besoins biologiques avec une précision mathématique."
  feature_2_title: "Géométrie Locale"
  feature_2_desc: "Analysez la topographie générée de façon procédurale. Identifiez les ressources stratégiques et optimisez les rendements."
  feature_3_title: "Algorithme Économique"
  feature_3_desc: "Les systèmes d'échange reposent sur la logique pure. L'offre, la demande et la rareté dictent la valeur globale."
  feature_4_title: "Unités Corporatives"
  feature_4_desc: "Calculez l'avantage de fonder ou rejoindre des entités corporatives pour optimiser les flux de ressources."
  visuals_title: "Registres de Surface"
  trailer_title: "Reconnaissance Visuelle (Bande-annonce)"
  comms_title: "Relais de Signal"
  footer: "Confirmer le Protocole"
  footer_desc: "Le transit est terminé. Un établissement permanent est requis. Sécurisez vos coordonnées de déploiement avant la perte d'intégrité."

de:
  header_boot: "[ SYSTEMNEUSTART... ZIEL ERREICHT ]"
  mission_title: "Atmosphärischer Eintritt"
  mission_desc_1: "Langzeittransit abgeschlossen. Geschätzte Dauer: 10.000 Zyklen. Speicherarchive unzugänglich. Umweltanalyse... Oberflächenbedingungen: Hostil. Status biologische Einheit: Funktional. Anpassungsprotokoll: Initiiert."
  mission_desc_2: "Orbitaler Zerfall erkannt. Notlandung unvermeidlich. Einsatz der Überlebenskapseln läuft. Primärdirektive: Aufbau einer autarken Infrastruktur auf der Oberfläche."
  mission_desc_3: "Ressourcen sind die einzige Konstante. Optimieren Sie die Extraktion, beherrschen Sie die Logistik und dominieren Sie die Umwelt. Emotionale Reaktionen wurden für maximale Effizienz entfernt. Überleben ist eine mathematische Gewissheit, wenn die Protokolle befolgt werden."
  btn_wishlist: "LANDUNG BESTÄTIGEN (STEAM)"
  btn_specs: "ARCHIVDATEN"
  btn_trailer: "TRAILER ANSEHEN"
  features_title: "Operative Protokolle"
  feature_1_title: "Logische Schnittstelle"
  feature_1_desc: "Überwachen Sie Vitalwerte über ein hocheffizientes HUD. Verwalten Sie biologische Anforderungen mit mathematischer Präzision."
  feature_2_title: "Lokale Geometrie"
  feature_2_desc: "Analysieren Sie die Topographie. Identifizieren Sie strategische Ressourcencluster für optimalen Ertrag."
  feature_3_title: "Wirtschaftsalgorithmus"
  feature_3_desc: "Handelssysteme basieren auf reiner Logik. Angebot, Nachfrage und Knappheit bestimmen den globalen Wert."
  feature_4_title: "Korporative Einheiten"
  feature_4_desc: "Berechnen Sie den Nutzen der Gründung oder des Beitritts zu korporativen Einheiten zur Ressourcenoptimierung."
  visuals_title: "Oberflächendatenlogs"
  trailer_title: "Visuelle Aufklärung (Trailer)"
  comms_title: "Signalrelais"
  footer: "Protokoll bestätigen"
  footer_desc: "Transit ist terminal. Permanente Ansiedlung erforderlich. Sichern Sie Ihre Koordinaten vor dem Integritätsverlust."

jp:
  header_boot: "[ システム再起動中... 目的地に到達 ]"
  mission_title: "大気圏突入"
  mission_desc_1: "長期移動完了。推定期間：10,000サイクル。メモリアーカイブにアクセス不可。環境分析中... 表面条件：敵対的。生体ユニットステータス：機能的。適応プロトコル：開始。"
  mission_desc_2: "軌道衰退を検知。緊急着陸は不可避。生存ポッドを展開中。主要指令：現地の表面に自立したインフラを構築せよ。"
  mission_desc_3: "資源こそが唯一の定数だ。採掘を最適化し、物流を支配し、環境を制圧せよ。効率を最大化するため、感情的反応は削除済みだ。プロトコルに従えば、生存は数学的な確実性となる。"
  btn_wishlist: "着陸を開始する (STEAM)"
  btn_specs: "アーカイブデータ"
  btn_trailer: "トレイラーを見る"
  features_title: "運用プロトコル"
  feature_1_title: "論理インターフェース"
  feature_1_desc: "高効率HUDでバイタルとシステムを監視。数学的精度で生物学的要求を管理せよ。"
  feature_2_title: "地形幾何学"
  feature_2_desc: "地形を分析せよ。戦略的な資源クラスターを特定し、最適なリターンのために高リスクゾーンを航行せよ。"
  feature_3_title: "経済アルゴリズム"
  feature_3_desc: "取引システムは純粋な論理で稼働する。供給、需要、希少性がすべての素材の価値を決定する。"
  feature_4_title: "企業ユニット"
  feature_4_desc: "資源フローと戦略的セキュリティを最適化するため、企業体への加入または新設の利益を計算せよ。"
  visuals_title: "表面データログ"
  trailer_title: "作戦偵察報告 (トレイラー)"
  comms_title: "信号中継"
  footer: "プロトコルを確認"
  footer_desc: "移動は終了した。恒久的な移住が必要だ。構造的完全性が失われる前に、展開座標を確保せよ。"

zh:
  header_boot: "[ 系统重启中... 已到达目的地 ]"
  mission_title: "进入大气层"
  mission_desc_1: "长期航行结束。预计时长：10,000周期。记忆档案无法访问。环境分析中... 表面条件：敌对。生物单元状态：功能正常。适应协议：已启动。"
  mission_desc_2: "检测到轨道衰变。紧急着陆不可避免。正在部署生存舱。主要指令：在当地表面建立自给自足的基础设施。"
  mission_desc_3: "资源是唯一的常量。优化开采，掌握物流，统治环境。为实现效率最大化，已移除情感反应。只要遵循协议，生存就是数学上的必然。"
  btn_wishlist: "确认着陆 (STEAM)"
  btn_specs: "档案数据"
  btn_trailer: "观看预告片"
  features_title: "作战协议"
  feature_1_title: "逻辑界面"
  feature_1_desc: "通过高效HUD监测生命体征。以数学精度管理生物需求。"
  feature_2_title: "局部几何"
  feature_2_desc: "分析随机生成的拓扑结构。识别战略资源群，在风险区域导航以获得最佳收益。"
  feature_3_title: "经济算法"
  feature_3_desc: "交易系统基于纯粹逻辑运行。供需和稀缺性决定了所有材料的全球价值。"
  feature_4_title: "企业单元"
  feature_4_desc: "计算建立或加入企业实体的利益，以优化资源流和战略安全。"
  visuals_title: "表面数据日志"
  trailer_title: "作战侦察报告 (预告片)"
  comms_title: "信号中継"
  footer: "确认协议"
  footer_desc: "航行已终止。需要永久定居。在结构完整性失效前，确保你的部署坐标。"
