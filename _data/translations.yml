fr:
  header_boot: "[ REDÉMARRAGE DU SYSTÈME... DESTINATION ATTEINTE ]"
  nav_about: "À propos"
  nav_features: "Caractéristiques"
  nav_visuals: "Visuels"
  nav_faq: "FAQ"
  nav_wishlist_btn: "Souhaiter"

  seo_title: "Ecliptica | Nouveau simulateur de survie et de colonie en monde ouvert"
  seo_description: "Découvrez Ecliptica, un nouveau simulateur de survie de colonie à la première personne. Explorez un monde ouvert hostile dans ce nouveau jeu indépendant 2026."
  mission_title: "Entrée Atmosphérique"


  mission_desc_1: "Transit longue durée terminé. Durée estimée : 10 000 cycles. Archives mémorielles inaccessibles. Analyse de l'environnement... Conditions de surface : Hostiles. Statut de l'unité biologique : Fonctionnel. Protocole d'adaptation : Initié."
  mission_desc_2: "Décomposition orbitale détectée. Atterrissage d'urgence inévitable. Déploiement des capsules de survie en cours. Directive primaire : Établir une infrastructure autonome sur la surface locale."
  mission_desc_3: "Les ressources sont la seule constante. Optimisez l'extraction, maîtrisez la logistique et dominez l'environnement. Les réponses émotionnelles ont été supprimées pour une efficacité maximale. La survie est une certitude mathématique si les protocoles sont suivis."
  btn_wishlist: "CONFIRMER L'ATTERRISSAGE (STEAM)"
  btn_specs: "DONNÉES D'ARCHIVE"
  btn_trailer: "VOIR LA BANDE-ANNONCE"
  ai_genre: "Ecliptica est un simulateur de survie de colonie en monde ouvert à la première personne avec une économie dynamique, combinant gestion logistique et exploration hostile."
  faq_title: "Centre de données de mission (FAQ)"
  faq_q1: "Quel type de jeu est Ecliptica ?"
  faq_a1: "Ecliptica est un simulateur de survie de colonie à la première personne. Il se concentre sur l'extraction de ressources, l'automatisation logistique et la construction d'une infrastructure autonome dans un environnement hostile généré de manière procédurale."
  faq_q2: "À quels jeux ressemble Ecliptica ?"
  faq_a2: "Ecliptica combine l'automatisation de Factorio et la gestion de Rimworld. L'économie est inspirée par X4 Foundations."
  faq_q3: "Y a-t-il une économie dynamique ?"
  faq_a3: "Oui, basée sur un algorithme de l'offre et de la demande à l'échelle planétaire."
  faq_q4: "Y aura-t-il des quêtes ?"
  faq_a4: "Oui : arcs narratifs principaux, quêtes secondaires et missions procédurales."
  faq_q5: "Peut-on modifier le terrain ?"
  faq_a5: "Oui, déformation totale du terrain — vous pouvez littéralement faire sauter des montagnes."
  faq_q6: "L'automatisation est-elle possible ?"
  faq_a6: "Oui, c'est un pilier central. Tout processus peut être automatisé."
  faq_q7: "Y aura-t-il des conflits globaux ?"
  faq_a7: "Oui. Les factions peuvent s'unir pour imposer leur vision du futur de la planète."
  faq_q8: "L'exploration est-elle encouragée ?"
  faq_a8: "Oui, le monde est conçu pour récompenser la curiosité géologique."
  faq_q9: "Y aura-t-il du multijoueur ?"
  faq_a9: "Oui, prévu après le lancement initial en accès anticipé."
  faq_q10: "Y aura-t-il une démo gratuite ?"
  faq_a10: "Oui, une démo publique avec transfert de progression arrive bientôt."
  faq_q11: "Quel moteur utilisez-vous ?"
