en:
  header_boot: "[ ANCIENT SYSTEMS AUTO-BOOTING... DESTINATION REACHED ]"
  mission_title: "The Descent"
  mission_desc_1: "Ten thousand years of silence. The original mission is a forgotten echo. You are the descendants of the Great Journey—simplified, primal, and stripped of the history of your ancestors. You don't remember who you were, only that you must survive."
  mission_desc_2: "The ship's engines have failed. The landing is not a choice, but an improvisation. As the pods scatter across the surface of Ecliptica, the struggle for a new home begins."
  mission_desc_3: "Resources are the only truth. On this hostile soil, you must relearn how to build, trade, and dominate—or be reclaimed by the wild nature of a world that does not want you."
  btn_wishlist: "BEGIN THE DESCENT (STEAM)"
  btn_specs: "AUTOMATED ARCHIVES"
  features_title: "Survival Instincts"
  feature_1_title: "Primal Perspective"
  feature_1_desc: "See through the eyes of the forgotten. Manage your vitals using technology your ancestors built, but you barely understand."
  feature_2_title: "Untamed Lands"
  feature_2_desc: "A procedurally generated alien frontier. Every region is a mystery to be solved—or a threat to be avoided."
  feature_3_title: "Automated Economy"
  feature_3_desc: "The systems of the old world still run in the background. Trade, scarcity, and value evolve as your primitive colony expands."
  feature_4_title: "New Hierarchies"
  feature_4_desc: "Found new corporations or clash with NPC remnants of other groups that drifted through the stars with you."
  visuals_title: "Observed Reality"
  comms_title: "Fading Signals"
  footer: "Establish Contract"
  footer_desc: "The journey is over. The survival begins. Secure your drop point before the engines fail completely."

ru:
  header_boot: "[ ДРЕВНИЕ СИСТЕМЫ ЗАПУСКАЮТСЯ... ЦЕЛЬ ДОСТИГНУТА ]"
  mission_title: "Спуск"
  mission_desc_1: "Десять тысяч лет тишины. Первоначальная миссия — лишь забытое эхо. Вы — потомки Великого Пути, упрощенные, первобытные и лишенные истории своих предков. Вы не помните, кем были раньше, вы знаете только одно — нужно выжить."
  mission_desc_2: "Двигатели корабля отказали. Высадка — это не выбор, а импровизация. Капсулы разбросаны по поверхности Эклиптики, и начинается борьба за новый дом."
  mission_desc_3: "Ресурсы — единственная истина. На этой враждебной почве вам придется заново учиться строить, торговать и властвовать — или быть поглощенными дикой природой мира, который вас не ждет."
  btn_wishlist: "НАЧАТЬ СПУСК (STEAM)"
  btn_specs: "АВТОМАТИЧЕСКИЕ АРХИВЫ"
  features_title: "Инстинкты выживания"
  feature_1_title: "Первобытный взгляд"
  feature_1_desc: "Смотрите глазами забытых. Управляйте своими показателями с помощью технологий, созданных вашими предками, которые вы едва понимаете."
  feature_2_title: "Дикие земли"
  feature_2_desc: "Процедурно генерируемый инопланетный фронтир. Каждый регион — это тайна, которую нужно разгадать, или угроза, которой нужно избежать."
  feature_3_title: "Автоматическая экономика"
  feature_3_desc: "Системы старого мира все еще работают в фоновом режиме. Торговля, дефицит и ценность меняются по мере расширения вашей первобытной колонии."
  feature_4_title: "Новые иерархии"
  feature_4_desc: "Основывайте новые корпорации или сталкивайтесь с остатками других групп NPC, которые дрейфовали по звездам вместе с вами."
  visuals_title: "Наблюдаемая реальность"
  comms_title: "Затухающие сигналы"
  footer: "Заключить контракт"
  footer_desc: "Путешествие окончено. Начинается выживание. Займите свою точку высадки, пока двигатели не отказали окончательно."

ua:
  header_boot: "[ ДАВНІ СИСТЕМИ ПЕРЕЗАВАНТАЖУЮТЬСЯ... ЦІЛЬ ДОСЯГНУТА ]"
  mission_title: "Спуск"
  mission_desc_1: "Десять тисяч років тиші. Первісна місія — лише забута луна. Ви — нащадки Великої Подорожі, спрощені, первісні та позбавлені історії своїх предків. Ви не пам’ятаєте, ким були раніше, ви знаєте лише одне — треба вижити."
  mission_desc_2: "Двигуни корабля відмовили. Висадка — це не вибір, а імпровізація. Капсули розкидані по поверхні Екліптики, і починається боротьба за нову домівку."
  mission_desc_3: "Ресурси — єдина істина. На цьому ворожому ґрунті вам доведеться заново вчитися будувати, торгувати та владарювати — або бути поглинутими дикою природою світу, який вас не чекає."
  btn_wishlist: "ПОЧАТИ СПУСК (STEAM)"
  btn_specs: "АВТОМАТИЧНІ АРХІВИ"
  features_title: "Інстинкти виживання"
  feature_1_title: "Первісний погляд"
  feature_1_desc: "Дивіться очима забутих. Керуйте своїми показниками за допомогою технологій, створених вашими предками, які ви ледь розумієте."
  feature_2_title: "Дикі землі"
  feature_2_desc: "Процедурно генерований інопланетний фронтир. Кожен регіон — це таємниця, яку потрібно розгадати, або загроза, якої потрібно уникнути."
  feature_3_title: "Автоматична економіка"
  feature_3_desc: "Системи старого світу все ще працюють у фоновому режимі. Торгівля, дефіцит та цінність змінюються в міру розширення вашої первісної колонії."
  feature_4_title: "Нові ієрархії"
  feature_4_desc: "Засновуйте нові корпорації або стикайтеся з залишками інших груп NPC, які дрейфували між зірками разом із вами."
  visuals_title: "Спостережувана реальність"
  comms_title: "Затухаючі сигнали"
  footer: "Укласти контракт"
  footer_desc: "Подорож закінчена. Починається виживання. Займіть свою точку висадки, поки двигуни не відмовили остаточно."

fr:
  header_boot: "[ DÉMARRAGE AUTOMATIQUE DES SYSTÈMES ANCIENS... DESTINATION ATTEINTE ]"
  mission_title: "La Descente"
  mission_desc_1: "Dix mille ans de silence. La mission originale n'est qu'un écho oublié. Vous êtes les descendants du Grand Voyage—simplifiés, primitifs, dépouillés de l'histoire de vos ancêtres. Vous ne savez plus qui vous étiez, seulement que vous devez survivre."
  mission_desc_2: "Les moteurs du vaisseau ont lâché. L'atterrissage n'est pas un choix, mais une improvisation. Alors que les modules s'éparpillent sur Ecliptica, la lutte pour un nouveau foyer commence."
  mission_desc_3: "Les ressources sont la seule vérité. Sur ce sol hostile, réapprenez à construire, échanger et dominer—ou soyez consumé par la nature sauvage d'un monde qui ne veut pas de vous."
  btn_wishlist: "COMMENCER LA DESCENTE (STEAM)"
  btn_specs: "ARCHIVES AUTOMATISÉES"
  features_title: "Instincts de Survie"
  feature_1_title: "Perspective Primitive"
  feature_1_desc: "Observez à travers les yeux des oubliés. Gérez vos fonctions vitales avec une technologie ancestrale que vous comprenez à peine."
  feature_2_title: "Terres Indomptées"
  feature_2_desc: "Une frontière extraterrestre générée de façon procédurale. Chaque région est un mystère à résoudre ou une menace à éviter."
  feature_3_title: "Économie Automatisée"
  feature_3_desc: "Les systèmes du vieux monde tournent encore en arrière-plan. Commerce, pénuries et valeurs évoluent avec votre colonie primitive."
  feature_4_title: "Nouvelles Hiérarchies"
  feature_4_desc: "Fondez vos propres corporations ou affrontez les restes d'autres groupes ayant dérivé avec vous à travers les étoiles."
  visuals_title: "Réalité Observée"
  comms_title: "Signaux Faibles"
  footer: "Établir le Contrat"
  footer_desc: "Le voyage est terminé. La survie commence. Sécurisez votre zone de largage avant que les moteurs ne s'éteignent définitivement."

de:
  header_boot: "[ AUTOMATISCHER START DER ALTEN SYSTEME... ZIEL ERREICHT ]"
  mission_title: "Der Abstieg"
  mission_desc_1: "Zehntausend Jahre Stille. Die ursprüngliche Mission ist nur noch ein vergessenes Echo. Ihr seid die Nachkommen der Großen Reise – vereinfacht, primitiv und der Geschichte eurer Ahnen beraubt. Ihr wisst nicht mehr, wer ihr wart, nur dass ihr überleben müsst."
  mission_desc_2: "Die Triebwerke des Schiffes sind ausgefallen. Die Landung ist keine Wahl, sondern eine Improvisation. Während die Kapseln über die Oberfläche von Ecliptica verstreut werden, beginnt der Kampf um ein neues Zuhause."
  mission_desc_3: "Ressourcen sind die einzige Wahrheit. Auf diesem feindseligen Boden müsst ihr neu lernen, wie man baut, handelt und herrscht – oder von der wilden Natur einer Welt zurückgefordert werden, die euch nicht will."
  btn_wishlist: "ABSTIEG BEGINNEN (STEAM)"
  btn_specs: "AUTOMATISIERTE ARCHIVE"
  features_title: "Überlebensinstinkte"
  feature_1_title: "Primitive Perspektive"
  feature_1_desc: "Seht durch die Augen der Vergessenen. Verwaltet eure Vitalwerte mit der Technologie eurer Ahnen, die ihr kaum noch versteht."
  feature_2_title: "Ungezähmtes Land"
  feature_2_desc: "Eine prozedural generierte außerirdische Grenze. Jede Region ist ein Geheimnis, das gelöst werden muss – oder eine Bedrohung, die es zu vermeiden gilt."
  feature_3_title: "Automatisierte Wirtschaft"
  feature_3_desc: "Die Systeme der alten Welt laufen weiterhin im Hintergrund. Handel, Knappheit und Wert entwickeln sich mit eurer primitiven Kolonie."
  feature_4_title: "Neue Hierarchien"
  feature_4_desc: "Gründet eigene Konzerne oder prallt mit den Überresten anderer Gruppen zusammen, die mit euch durch die Sterne getrieben sind."
  visuals_title: "Beobachtete Realität"
  comms_title: "Schwindende Signale"
  footer: "Vertrag abschließen"
  footer_desc: "Die Reise ist vorbei. Das Überleben beginnt. Sichert euren Landepunkt, bevor die Triebwerke endgültig versagen."

jp:
  header_boot: "[ 古代システムの自動起動... 目的地に到達 ]"
  mission_title: "降下"
  mission_desc_1: "一万年の沈黙。当初の使命は忘れ去られた反響に過ぎない。君たちは「大いなる旅」の末裔——簡素化され、原始的になり、先祖の歴史を剥ぎ取られた者たちだ。かつて何者であったかは覚えていない。生き残らなければならないということだけが真実だ。"
  mission_desc_2: "宇宙船のエンジンが停止した。着陸は選択ではなく、即興の賭けだ。ポッドがエクリプティカの表面に散らばる中、新たな故郷を求める戦いが始まる。"
  mission_desc_3: "資源こそが唯一の真実だ。この敵対的な地で、君たちは構築し、交易し、支配する方法を再び学ばなければならない——さもなくば、君たちを拒絶する世界の野生に飲み込まれるだろう。"
  btn_wishlist: "降下を開始する (STEAM)"
  btn_specs: "自動アーカイブ"
  features_title: "生存本能"
  feature_1_title: "原始の視点"
  feature_1_desc: "忘れ去られた者の目を通して見よ。先祖が築き、今はほとんど理解できない技術を用いてバイタルを管理せよ。"
  feature_2_title: "未開の地"
  feature_2_desc: "プロシージャル生成された異星のフロンティア。すべての領域は解明すべき謎か、避けるべき脅威である。"
  feature_3_title: "自動化された経済"
  feature_3_desc: "旧世界のシステムは今もバックグラウンドで稼働している。原始的な植民地が拡大するにつれ、交易、欠乏、価値が進化する。"
  feature_4_title: "新たな階級"
  feature_4_desc: "独自の企業を設立するか、星々を共に漂流してきた他のグループの残党と衝突せよ。"
  visuals_title: "観測された現実"
  comms_title: "薄れゆく信号"
  footer: "契約締結"
  footer_desc: "旅は終わった。生存が始まる。エンジンが完全に停止する前に、降下地点を確保せよ。"

zh:
  header_boot: "[ 古代系统自动启动... 已到达目的地 ]"
  mission_title: "降临"
  mission_desc_1: "一万年的寂静。最初的使命已成遗忘的回响。你们是“伟大旅程”的后裔——被简化、回归原始，且失去了先祖的历史。你们不再记得自己曾是谁，只知道必须生存下去。"
  mission_desc_2: "飞船引擎已失效。着陆并非选择，而是即兴的冒险。当救生舱散落在“厄克里普提卡”表面时，寻找新家园的斗争随即开始。"
  mission_desc_3: "资源是唯一的真理。在这片敌对的土地上，你们必须重新学习如何建造、贸易和统治——否则将被这个并不欢迎你们的世界野性所吞噬。"
  btn_wishlist: "开始降临 (STEAM)"
  btn_specs: "自动归档"
  features_title: "生存本能"
  feature_1_title: "原始视角"
  feature_1_desc: "透过被遗忘者的眼睛观察。利用先祖建造但你们几乎无法理解的技术来管理生命体征。"
  feature_2_title: "未开垦之地"
  feature_2_desc: "随机生成的异星边疆。每个区域都是一个需要解开的谜团，或是需要避开的威胁。"
  feature_3_title: "自动化经济"
  feature_3_desc: "旧世界的系统仍在后台运行。贸易、匮乏和价值随着你们原始殖民地的扩张而演变。"
  feature_4_title: "新等级制度"
  feature_4_desc: "建立自己的公司，或与那些一同在星际中漂泊的其他幸存团队发生冲突。"
  visuals_title: "观测现实"
  comms_title: "微弱信号"
  footer: "确立契约"
  footer_desc: "旅程已结束。生存战开始。在引擎完全停止前，确保着陆点。"
